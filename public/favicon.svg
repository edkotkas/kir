<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
    <title>キR QR Code Generator</title>
    <defs>
        <radialGradient id="gp" cx="90%" cy="0%" r="50%">
            <stop offset="0%" stop-color="#f472b6" stop-opacity="0.28" />
            <stop offset="100%" stop-color="#f472b6" stop-opacity="0" />
        </radialGradient>
        <radialGradient id="gv" cx="0%" cy="100%" r="50%">
            <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.35" />
            <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0" />
        </radialGradient>
        <linearGradient id="gt" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#dbc7ea" />
            <stop offset="45%" stop-color="#c084fc" />
            <stop offset="100%" stop-color="#f472b6" />
        </linearGradient>
        <filter id="kGlow" x="-30%" y="-30%" width="160%" height="160%">
            <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#f3e8ff" flood-opacity="0.55" />
            <feDropShadow dx="0" dy="0" stdDeviation="22" flood-color="#c084fc" flood-opacity="0.45" />
        </filter>
    </defs>
    <rect width="1024" height="1024" rx="180" fill="#170f24" />
    <rect width="1024" height="1024" rx="180" fill="url(#gp)" />
    <rect width="1024" height="1024" rx="180" fill="url(#gv)" />
    <g
        font-family="'Segoe UI', 'Yu Gothic UI', 'Yu Gothic', 'MS Gothic', sans-serif"
        font-weight="700"
        dominant-baseline="middle"
        text-anchor="middle"
    >
        <text
            x="380"
            y="512"
            font-size="560"
            fill="#f3e8ff"
            stroke="#c084fc"
            stroke-width="10"
            paint-order="stroke fill"
            filter="url(#kGlow)"
        >キ</text>
        <text x="680" y="512" font-size="440" fill="url(#gt)">R</text>
    </g>
</svg>